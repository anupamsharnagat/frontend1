<!DOCTYPE html>
<html>
<head>
<title>Azure AI Assistant</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-box{
width:500px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.user{color:blue}
.bot{color:green}

</style>
</head>

<body>

<div class="chat-box">

<h2>AI Assistant</h2>

<div id="messages"></div>

<input id="question" style="width:80%" placeholder="Ask something..."/>
<button onclick="ask()">Send</button>

</div>

<script>

async function ask(){

const question=document.getElementById("question").value

addMessage("You: "+question,"user")

const res=await fetch("http://llm-chat-backend-1-a2etd6czddhqcpdq.swedencentral-01.azurewebsites.net/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:question})
})

const data=await res.json()

addMessage("AI: "+data.answer,"bot")

}

function addMessage(text,cls){

const div=document.createElement("div")
div.className=cls
div.innerText=text

document.getElementById("messages").appendChild(div)

}

</script>

</body>
</html>
